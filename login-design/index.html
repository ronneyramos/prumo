<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRUMO ERP — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F4F6F8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    /* ── GRID 2 COLUNAS ─────────────────────────────────── */
    .container {
      display: flex;
      max-width: 1120px;
      width: 100%;
      min-height: 620px;
      margin: 0 auto;
      gap: 0;
    }

    /* ── COLUNA ESQUERDA (45%) ───────────────────────────── */
    .col-left {
      width: 45%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 48px 40px 48px 0;
    }

    /* ── LOGO ────────────────────────────────────────────── */
    .logo-block {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 28px;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-text .prumo {
      font-size: 26px;
      font-weight: 800;
      color: #1D3557;
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .logo-text .erp {
      font-size: 10px;
      font-weight: 400;
      color: #457B9D;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 2px;
      line-height: 1;
    }

    .logo-text .tagline {
      font-size: 9.5px;
      font-weight: 600;
      color: #6B7A8F;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-top: 2px;
      line-height: 1;
    }

    /* ── TÍTULO ──────────────────────────────────────────── */
    .welcome-title {
      font-size: 21px;
      font-weight: 800;
      color: #1D3557;
      line-height: 1.35;
      margin-bottom: 28px;
    }

    /* ── CARD BRANCO DO FORMULÁRIO ───────────────────────── */
    .form-card {
      background: #FFFFFF;
      border-radius: 14px;
      padding: 28px 28px 20px;
      box-shadow: 0 4px 24px rgba(29, 53, 87, 0.08), 0 1px 4px rgba(0,0,0,0.04);
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    .field-group:last-of-type {
      margin-bottom: 14px;
    }

    .field-group label {
      font-size: 11px;
      font-weight: 700;
      color: #6B7A8F;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrap input {
      width: 100%;
      height: 48px;
      padding: 0 14px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      color: #1D3557;
      background: #F1F3F5;
      border: 1.5px solid transparent;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .input-wrap input::placeholder {
      color: #9AA8B9;
      font-weight: 400;
    }

    .input-wrap input:focus {
      background: #FFFFFF;
      border-color: #457B9D;
    }

    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: #1D3557;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s;
    }

    .eye-btn:hover { opacity: 0.7; }

    /* ── BOTÃO ENTRAR ────────────────────────────────────── */
    .btn-entrar {
      width: 100%;
      height: 50px;
      background: #E63946;
      color: #FFFFFF;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .btn-entrar:hover {
      background: #C1121F;
      box-shadow: 0 4px 16px rgba(230, 57, 70, 0.3);
    }

    .btn-entrar:active { transform: scale(0.98); }

    /* ── LINKS CENTRALIZADOS ABAIXO DO CARD ─────────────── */
    .login-links {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: #6B7A8F;
      line-height: 1.7;
    }

    .login-links a {
      color: #1D3557;
      font-weight: 600;
      text-decoration: none;
    }

    .login-links a:hover { text-decoration: underline; }

    .login-links .esqueceu {
      font-size: 12.5px;
      color: #6B7A8F;
      font-weight: 500;
    }

    /* ── BOTÃO ISOLADO "Criar conta gratuita" ────────────── */
    .btn-criar-conta {
      all: unset;
      display: inline-block;
      margin-top: 22px;
      padding: 10px 22px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      color: #1D3557;
      background: transparent;
      border: 1.5px solid #D1D9E6;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.2s;
      align-self: flex-start;
    }

    .btn-criar-conta:hover {
      border-color: #457B9D;
    }

    /* ── COLUNA DIREITA (55%) ────────────────────────────── */
    .col-right {
      width: 55%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .blueprint-card {
      width: 100%;
      background: linear-gradient(150deg, #E8EDF3 0%, #DDE3EC 100%);
      border-radius: 16px;
      padding: 28px 24px;
      position: relative;
      overflow: hidden;
      aspect-ratio: 1 / 1.15;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .blueprint-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(29,53,87,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(29,53,87,0.05) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    .blueprint-card svg {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
    }

    /* ── RESPONSIVO ──────────────────────────────────────── */
    @media (max-width: 860px) {
      .container {
        flex-direction: column;
        max-width: 480px;
        padding: 0 16px;
      }
      .col-left,
      .col-right {
        width: 100%;
        padding: 32px 0;
      }
      .col-right { display: none; }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- ═══ COLUNA ESQUERDA ═══ -->
    <div class="col-left">

      <!-- LOGO -->
      <div class="logo-block">
        <div class="logo-icon">
          <svg viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="6" y="6" width="6" height="28" rx="1.5" fill="#1D3557" />
            <rect x="14" y="6" width="22" height="6" rx="1.5" fill="#1D3557" />
            <rect x="14" y="14" width="13" height="6" rx="1.5" fill="#457B9D" />
            <rect x="14" y="22" width="6" height="12" rx="1.5" fill="#457B9D" />
            <line x1="14" y1="28" x2="34" y2="28" stroke="#E63946" stroke-width="2" stroke-linecap="round" />
            <circle cx="34" cy="28" r="2.5" fill="#E63946" />
          </svg>
        </div>
        <div class="logo-text">
          <span class="prumo">PRUMO</span>
          <span class="erp">ERP</span>
          <span class="tagline">Software de Construção Civil</span>
        </div>
      </div>

      <!-- TÍTULO -->
      <h2 class="welcome-title">
        OLÁ, GESTOR!<br />
        ACESSE SUA CONTA DE CONSTRUÇÃO
      </h2>

      <!-- CARD DO FORMULÁRIO -->
      <div class="form-card">
        <form onsubmit="event.preventDefault();">
          <div class="field-group">
            <label for="email">E-MAIL DA OBRA</label>
            <div class="input-wrap">
              <input type="email" id="email" placeholder="engenheiro@obra.com" autocomplete="email" />
            </div>
          </div>

          <div class="field-group">
            <label for="senha">SENHA</label>
            <div class="input-wrap">
              <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password" />
              <button type="button" class="eye-btn" id="toggleSenha" aria-label="Mostrar senha">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>

          <button type="submit" class="btn-entrar">ENTRAR</button>
        </form>
      </div>

      <!-- LINKS CENTRALIZADOS ABAIXO DO CARD -->
      <div class="login-links">
        <a href="#" class="esqueceu">Esqueceu a senha?</a><br />
        Ainda não tem conta?
        <a href="#"><strong>Solicite uma demonstração</strong></a>
        ou <a href="#"><strong>cadastre-se.</strong></a>
      </div>

      <!-- BOTÃO ISOLADO -->
      <button class="btn-criar-conta">Criar conta gratuita →</button>
    </div>

    <!-- ═══ COLUNA DIREITA ═══ -->
    <div class="col-right">
      <div class="blueprint-card">
        <svg viewBox="0 0 380 440" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Grid técnico (papel milimetrado) — linhas bem finas -->
          <g opacity="0.07">
            <line x1="0" y1="36" x2="380" y2="36" stroke="#1D3557" stroke-width="1"/>
            <line x1="0" y1="72" x2="380" y2="72" stroke="#1D3557" stroke-width="1"/>
            <line x1="0" y1="108" x2="380" y2="108" stroke="#1D3557" stroke-width="1"/>
            <line x1="0" y1="144" x2="380" y2="144" stroke="#1D3557" stroke-width="1"/>
            <line x1="0" y1="180" x2="380" y2="180" stroke="#1D3557" stroke-width="1"/>
            <line x1="0" y1="216" x2="380" y2="216" stroke="#1D3557" stroke-width="1"/>
            <line x1="0" y1="252" x2="380" y2="252" stroke="#1D3557" stroke-width="1"/>
            <line x1="0" y1="288" x2="380" y2="288" stroke="#1D3557" stroke-width="1"/>
            <line x1="0" y1="324" x2="380" y2="324" stroke="#1D3557" stroke-width="1"/>
            <line x1="0" y1="360" x2="380" y2="360" stroke="#1D3557" stroke-width="1"/>
            <line x1="0" y1="396" x2="380" y2="396" stroke="#1D3557" stroke-width="1"/>
            <line x1="0" y1="432" x2="380" y2="432" stroke="#1D3557" stroke-width="1"/>
            <line x1="36" y1="0" x2="36" y2="440" stroke="#1D3557" stroke-width="1"/>
            <line x1="72" y1="0" x2="72" y2="440" stroke="#1D3557" stroke-width="1"/>
            <line x1="108" y1="0" x2="108" y2="440" stroke="#1D3557" stroke-width="1"/>
            <line x1="144" y1="0" x2="144" y2="440" stroke="#1D3557" stroke-width="1"/>
            <line x1="180" y1="0" x2="180" y2="440" stroke="#1D3557" stroke-width="1"/>
            <line x1="216" y1="0" x2="216" y2="440" stroke="#1D3557" stroke-width="1"/>
            <line x1="252" y1="0" x2="252" y2="440" stroke="#1D3557" stroke-width="1"/>
            <line x1="288" y1="0" x2="288" y2="440" stroke="#1D3557" stroke-width="1"/>
            <line x1="324" y1="0" x2="324" y2="440" stroke="#1D3557" stroke-width="1"/>
            <line x1="360" y1="0" x2="360" y2="440" stroke="#1D3557" stroke-width="1"/>
          </g>

          <!-- Edifício — 4 pavimentos, estrutura de pilares e vigas -->
          <g stroke="#1D3557" stroke-width="2" fill="none">
            <!-- 4 colunas verticais (pilares) -->
            <line x1="65" y1="370" x2="65" y2="70" />
            <line x1="130" y1="370" x2="130" y2="70" />
            <line x1="195" y1="370" x2="195" y2="70" />
            <line x1="260" y1="370" x2="260" y2="70" />

            <!-- 5 vigas horizontais (lajes) -->
            <line x1="65" y1="310" x2="260" y2="310" />
            <line x1="65" y1="250" x2="260" y2="250" />
            <line x1="65" y1="190" x2="260" y2="190" />
            <line x1="65" y1="130" x2="260" y2="130" />
            <line x1="65" y1="70" x2="260" y2="70" />

            <!-- Fundação (base) -->
            <rect x="53" y="370" width="219" height="10" rx="2" stroke-width="2.5" />

            <!-- "X" estrutural nos dois primeiros vãos da base -->
            <line x1="65" y1="310" x2="130" y2="250" stroke-width="1.2" stroke="#457B9D" />
            <line x1="130" y1="310" x2="65" y2="250" stroke-width="1.2" stroke="#457B9D" />
            <line x1="130" y1="250" x2="195" y2="190" stroke-width="1.2" stroke="#457B9D" />
            <line x1="195" y1="250" x2="130" y2="190" stroke-width="1.2" stroke="#457B9D" />
          </g>

          <!-- Guindaste / Grua à direita -->
          <g stroke="#457B9D" stroke-width="1.8" fill="none">
            <!-- Torre vertical -->
            <line x1="320" y1="370" x2="320" y2="30" stroke-width="2.5" stroke="#1D3557" />
            <!-- Braço horizontal -->
            <line x1="280" y1="30" x2="360" y2="30" stroke-width="2.5" stroke="#1D3557" />
            <!-- Contra-peso -->
            <rect x="280" y="14" width="14" height="16" rx="2" stroke-width="1.5" />
            <!-- Cabo de aço -->
            <line x1="350" y1="30" x2="350" y2="90" stroke-width="1" stroke-dasharray="4 3" />
            <!-- Gancho -->
            <path d="M350,90 L350,100 Q350,108 345,108 Q340,108 340,103" stroke-width="1.5" />
            <!-- Detalhes treliçados -->
            <line x1="315" y1="40" x2="325" y2="60" stroke-width="0.8" />
            <line x1="325" y1="40" x2="315" y2="60" stroke-width="0.8" />
            <line x1="315" y1="80" x2="325" y2="100" stroke-width="0.8" />
            <line x1="325" y1="80" x2="315" y2="100" stroke-width="0.8" />
          </g>

          <!-- Andaimes laterais (lado esquerdo do edifício) -->
          <g stroke="#457B9D" stroke-width="1.2" fill="none" opacity="0.65">
            <line x1="42" y1="370" x2="42" y2="150" />
            <line x1="32" y1="370" x2="32" y2="150" />
            <!-- Degraus horizontais -->
            <line x1="32" y1="350" x2="42" y2="350" />
            <line x1="32" y1="330" x2="42" y2="330" />
            <line x1="32" y1="310" x2="42" y2="310" />
            <line x1="32" y1="290" x2="42" y2="290" />
            <line x1="32" y1="270" x2="42" y2="270" />
            <line x1="32" y1="250" x2="42" y2="250" />
            <line x1="32" y1="230" x2="42" y2="230" />
            <line x1="32" y1="210" x2="42" y2="210" />
            <line x1="32" y1="190" x2="42" y2="190" />
            <line x1="32" y1="170" x2="42" y2="170" />
            <!-- Diagonais do andaime -->
            <line x1="32" y1="350" x2="42" y2="330" stroke-width="0.8" />
            <line x1="32" y1="310" x2="42" y2="290" stroke-width="0.8" />
            <line x1="32" y1="270" x2="42" y2="250" stroke-width="0.8" />
            <line x1="32" y1="230" x2="42" y2="210" stroke-width="0.8" />
          </g>

          <!-- Cota de altura +28,50m (linha + texto + setas) -->
          <g stroke="#E63946" stroke-width="1" opacity="0.55">
            <line x1="278" y1="70" x2="278" y2="370" />
            <polygon points="278,70 273,80 283,80" fill="#E63946" />
            <polygon points="278,370 273,360 283,360" fill="#E63946" />
          </g>
          <text x="284" y="224" font-family="'Inter',sans-serif" font-size="9" font-weight="600" fill="#E63946" opacity="0.6">+28,50m</text>

          <!-- Texto "CORTE AA — ESTRUTURA" centralizado na base -->
          <text x="160" y="418" font-family="'Inter',sans-serif" font-size="9.5" font-weight="600" fill="#1D3557" opacity="0.45" text-anchor="middle">CORTE AA — ESTRUTURA</text>
        </svg>
      </div>
    </div>

  </div>

  <script>
    document.getElementById('toggleSenha').addEventListener('click', function() {
      var input = document.getElementById('senha');
      var type = input.getAttribute('type') === 'password' ? 'text' : 'password';
      input.setAttribute('type', type);
      this.innerHTML = type === 'password'
        ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'
        : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/></svg>';
    });
  </script>
</body>
</html>
